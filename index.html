<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0891b2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vokabel+">
  <meta name="description" content="Vokabel Master+ - Vokabeln lernen mit Karteikarten, Multiple Choice und mehr. Offline-fähige PWA für Schüler ab Klasse 5.">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Vokabel Master+</title>

  <!-- Manifest -->
  <link rel="manifest" href="./manifest.webmanifest">

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="./icons/icon-192.svg">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">

  <!-- Styles -->
  <link rel="stylesheet" href="./styles.css">

  <!-- Prevent FOUC -->
  <script>
    (function() {
      const theme = localStorage.getItem('vokabel-theme') || 'system';
      if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header" role="banner">
      <h1>
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 4v16h-12a2 2 0 0 1 -2 -2v-12a2 2 0 0 1 2 -2h12z" />
          <path d="M19 16h-12a2 2 0 0 0 -2 2" />
          <path d="M9 8h6" />
        </svg>
        Vokabel Master+
      </h1>
      <div class="header-actions">
        <button id="install-button" class="btn btn-primary btn-sm install-btn-hidden" aria-label="App installieren">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Installieren
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      <!-- Home View -->
      <div id="view-home" class="view active" role="region" aria-label="Home">
        <!-- Content wird dynamisch geladen -->
      </div>

      <!-- Learn View -->
      <div id="view-learn" class="view" role="region" aria-label="Lernen">
        <!-- Content wird dynamisch geladen -->
        <div class="empty-state">
          <div style="width: 40px; height: 40px; border: 3px solid var(--color-border); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
          <p class="mt-md">Laden...</p>
        </div>
      </div>

      <!-- Words View -->
      <div id="view-words" class="view" role="region" aria-label="Vokabeln">
        <!-- Content wird dynamisch geladen -->
      </div>

      <!-- Stats View -->
      <div id="view-stats" class="view" role="region" aria-label="Statistik">
        <!-- Content wird dynamisch geladen -->
      </div>

      <!-- Settings View -->
      <div id="view-settings" class="view" role="region" aria-label="Einstellungen">
        <!-- Content wird dynamisch geladen -->
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" role="navigation" aria-label="Hauptnavigation">
      <button class="nav-item active" data-view="home" aria-label="Home" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12l-2 0l9 -9l9 9l-2 0" />
          <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7" />
          <path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6" />
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-view="learn" aria-label="Lernen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 9l-10 -4l-10 4l10 4l10 -4v6" />
          <path d="M6 10.6v5.4a6 3 0 0 0 12 0v-5.4" />
        </svg>
        <span>Lernen</span>
      </button>
      <button class="nav-item" data-view="words" aria-label="Vokabeln">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 3v4a1 1 0 0 0 1 1h4" />
          <path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z" />
          <path d="M9 17h6" />
          <path d="M9 13h6" />
        </svg>
        <span>Wörter</span>
      </button>
      <button class="nav-item" data-view="stats" aria-label="Statistik">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12m0 1a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v6a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1z" />
          <path d="M9 8m0 1a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1z" />
          <path d="M15 4m0 1a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v14a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1z" />
          <path d="M4 20l14 0" />
        </svg>
        <span>Statistik</span>
      </button>
      <button class="nav-item" data-view="settings" aria-label="Einstellungen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37a1.724 1.724 0 0 0 2.572 -1.065z" />
          <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" />
        </svg>
        <span>Einstellungen</span>
      </button>
    </nav>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modal-title">
    <div class="modal">
      <!-- Modal content wird dynamisch geladen -->
    </div>
  </div>

  <!-- FAB (Floating Action Button) -->
  <button id="fab-add" class="fab hidden" aria-label="Neue Vokabel hinzufügen" onclick="WordsView.showAddModal('Eigene Wörter')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container" role="status" aria-live="polite"></div>

  <noscript>
    <div style="padding: 2rem; text-align: center;">
      <h1>JavaScript benötigt</h1>
      <p>Bitte aktiviere JavaScript in deinem Browser, um Vokabel Master+ zu verwenden.</p>
    </div>
  </noscript>

  <!-- Loading Animation Keyframe -->
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .install-btn-hidden { display: none; }
    .install-btn-hidden.show { display: inline-flex !important; }
  </style>

  <!-- App Script -->
  <script src="./app.js"></script>
</body>
</html>
